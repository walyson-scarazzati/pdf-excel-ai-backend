services:
  backend:
    build:
      context: .
    restart: unless-stopped
    environment:
      PORT: ${PORT:-8081}
      AI_PROVIDER: ${AI_PROVIDER:-github-models}
      AI_API_URL: ${AI_API_URL:-https://models.github.ai/inference/chat/completions}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-openai/gpt-4.1-mini}
      AI_GITHUB_API_VERSION: ${AI_GITHUB_API_VERSION:-2026-03-10}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      OCR_ENABLED: ${OCR_ENABLED:-true}
      OCR_COMMAND: ${OCR_COMMAND:-tesseract}
      OCR_MODE: ${OCR_MODE:-auto}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-por}
      OCR_PSM: ${OCR_PSM:-4}
      OCR_TIMEOUT_SECONDS: ${OCR_TIMEOUT_SECONDS:-25}
      OCR_MAX_PAGES: ${OCR_MAX_PAGES:-2}
    ports:
      - "${HOST_PORT:-8081}:${PORT:-8081}"
