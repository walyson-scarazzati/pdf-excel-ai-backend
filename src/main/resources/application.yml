spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: pdf-excel-ai
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java,src/main/resources
  servlet:
    multipart:
      enabled: true
      max-file-size: ${APP_MAX_FILE_SIZE:200MB}
      max-request-size: ${APP_MAX_REQUEST_SIZE:200MB}
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pdf_excel_ai}}
    username: ${DB_USERNAME:pdf_excel_ai}
    password: ${DB_PASSWORD:pdf_excel_ai}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:3}
      minimum-idle: ${DB_MIN_IDLE:1}
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: ${PORT:8081}
  compression:
    enabled: true
    mime-types: application/json,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
    min-response-size: 2KB
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:20}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:2}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  pdf:
    preview-max-rendered-pages: ${PDF_PREVIEW_MAX_RENDERED_PAGES:1}
    image-dpi: ${PDF_IMAGE_DPI:120}
  ai:
    provider: ${AI_PROVIDER:openai}
    api-url: ${AI_API_URL:https://api.openai.com/v1/chat/completions}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:gpt-4.1-mini}
    github-api-version: ${AI_GITHUB_API_VERSION:2026-03-10}
  ocr:
    enabled: ${OCR_ENABLED:false}
    command: ${OCR_COMMAND:tesseract}
    mode: ${OCR_MODE:auto}
    language: ${OCR_LANGUAGE:por}
    page-segmentation-mode: ${OCR_PSM:4}
    timeout-seconds: ${OCR_TIMEOUT_SECONDS:25}
    max-pages: ${OCR_MAX_PAGES:2}
    max-image-pixels: ${OCR_MAX_IMAGE_PIXELS:6000000}
    preprocess-enabled: ${OCR_PREPROCESS_ENABLED:true}
    contrast-factor: ${OCR_CONTRAST_FACTOR:1.35}
    threshold: ${OCR_THRESHOLD:168}
    upscale-factor: ${OCR_UPSCALE_FACTOR:1}
    deskew-enabled: ${OCR_DESKEW_ENABLED:true}
    max-deskew-angle: ${OCR_MAX_DESKEW_ANGLE:3.0}
    crop-top-ratio: ${OCR_CROP_TOP_RATIO:0.12}
    crop-bottom-ratio: ${OCR_CROP_BOTTOM_RATIO:0.03}
    crop-side-ratio: ${OCR_CROP_SIDE_RATIO:0.03}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,https://pdf-excel-ai-frontend.vercel.app}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.springframework: ${LOG_LEVEL_SPRING:INFO}
    org.apache.coyote.http11.Http11Processor: ${LOG_LEVEL_HTTP11:WARN}
    com.zaxxer.hikari: ${LOG_LEVEL_HIKARI:INFO}
    java.lang.ProcessBuilder: ${LOG_LEVEL_PROCESS_BUILDER:INFO}
