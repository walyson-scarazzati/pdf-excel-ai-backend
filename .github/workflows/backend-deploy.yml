name: Deploy Backend to GCP (Production)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy when running manually"
        required: false
        default: "latest"
  workflow_run:
    workflows:
      - Build Backend Image
    types:
      - completed

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-gcp-production
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
      GCP_ARTIFACT_REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY || 'pdf-excel-ai' }}
      GCP_SERVICE_NAME: ${{ vars.GCP_SERVICE_NAME || 'pdf-excel-ai-backend' }}
      APP_CORS_ALLOWED_ORIGINS: ${{ vars.APP_CORS_ALLOWED_ORIGINS || 'https://seu-frontend.vercel.app' }}
      AI_PROVIDER: ${{ vars.AI_PROVIDER || 'github-models' }}
      AI_API_URL: ${{ vars.AI_API_URL || 'https://models.github.ai/inference/chat/completions' }}
      AI_MODEL: ${{ vars.AI_MODEL || 'openai/gpt-4.1-mini' }}
      AI_GITHUB_API_VERSION: ${{ vars.AI_GITHUB_API_VERSION || '2026-03-10' }}

    steps:
      - name: Checkout source (triggered by build workflow)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout source (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Set deploy commit SHA
        id: commit
        run: |
          sha="latest"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            input_tag="${{ github.event.inputs.image_tag }}"
            if [ -n "$input_tag" ]; then
              sha="$input_tag"
            fi
          fi

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            sha="${{ github.event.workflow_run.head_sha }}"
          fi

          echo "value=${sha}" >> "$GITHUB_OUTPUT"

      - name: Validate required configuration
        run: |
          test -n "$GCP_PROJECT_ID" || (echo "Missing GCP project id. Set repository variable GCP_PROJECT_ID (preferred) or secret GCP_PROJECT_ID." && exit 1)
          test -n "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" || (echo "Missing secret GCP_WORKLOAD_IDENTITY_PROVIDER" && exit 1)
          test -n "${{ secrets.GCP_SERVICE_ACCOUNT }}" || (echo "Missing secret GCP_SERVICE_ACCOUNT" && exit 1)
          test -n "${{ secrets.DB_URL }}" || (echo "Missing secret DB_URL" && exit 1)
          test -n "${{ secrets.DB_USERNAME }}" || (echo "Missing secret DB_USERNAME" && exit 1)
          test -n "${{ secrets.DB_PASSWORD }}" || (echo "Missing secret DB_PASSWORD" && exit 1)
          test -n "${{ secrets.AI_API_KEY }}" || (echo "Missing secret AI_API_KEY" && exit 1)

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve image URI
        id: image
        run: |
          echo "uri=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REPOSITORY}/backend:${{ steps.commit.outputs.value }}" >> "$GITHUB_OUTPUT"

      - name: Ensure image exists in Artifact Registry
        run: |
          gcloud artifacts docker images describe "${{ steps.image.outputs.uri }}" --project "${GCP_PROJECT_ID}"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Generate Terraform CI vars
        working-directory: infra/gcp
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: |
          jq -n \
            --arg project_id "$GCP_PROJECT_ID" \
            --arg region "$GCP_REGION" \
            --arg service_name "$GCP_SERVICE_NAME" \
            --arg artifact_repository_id "$GCP_ARTIFACT_REPOSITORY" \
            --arg container_image "${{ steps.image.outputs.uri }}" \
            --arg app_cors_allowed_origins "$APP_CORS_ALLOWED_ORIGINS" \
            --arg ai_provider "$AI_PROVIDER" \
            --arg ai_api_url "$AI_API_URL" \
            --arg ai_model "$AI_MODEL" \
            --arg ai_github_api_version "$AI_GITHUB_API_VERSION" \
            --arg db_url "$DB_URL" \
            --arg db_username "$DB_USERNAME" \
            --arg db_password "$DB_PASSWORD" \
            --arg ai_api_key "$AI_API_KEY" \
            '{
              project_id: $project_id,
              region: $region,
              service_name: $service_name,
              artifact_repository_id: $artifact_repository_id,
              container_image: $container_image,
              allow_unauthenticated: true,
              deletion_protection: false,
              plain_env: {
                SPRING_PROFILES_ACTIVE: "prod",
                APP_CORS_ALLOWED_ORIGINS: $app_cors_allowed_origins,
                AI_PROVIDER: $ai_provider,
                AI_API_URL: $ai_api_url,
                AI_MODEL: $ai_model,
                AI_GITHUB_API_VERSION: $ai_github_api_version,
                OCR_ENABLED: "true",
                OCR_COMMAND: "tesseract",
                OCR_MODE: "auto",
                OCR_LANGUAGE: "por",
                OCR_PSM: "4",
                OCR_TIMEOUT_SECONDS: "25",
                OCR_MAX_PAGES: "2",
                OCR_PREPROCESS_ENABLED: "true",
                OCR_CONTRAST_FACTOR: "1.35",
                OCR_THRESHOLD: "168",
                OCR_UPSCALE_FACTOR: "1"
              },
              secret_values: {
                DB_URL: $db_url,
                DB_USERNAME: $db_username,
                DB_PASSWORD: $db_password,
                AI_API_KEY: $ai_api_key
              }
            }' > terraform.ci.auto.tfvars.json

      - name: Terraform apply
        working-directory: infra/gcp
        run: |
          terraform init -input=false

          # CI runners start with empty local state; import existing resources to avoid recreate failures.
          service_account_id="$(echo "$GCP_SERVICE_NAME" | tr '_' '-' | cut -c1-28)"
          service_account_email="${service_account_id}@${GCP_PROJECT_ID}.iam.gserviceaccount.com"

          terraform import 'google_artifact_registry_repository.docker' "projects/${GCP_PROJECT_ID}/locations/${GCP_REGION}/repositories/${GCP_ARTIFACT_REPOSITORY}" || true
          terraform import 'google_service_account.run' "projects/${GCP_PROJECT_ID}/serviceAccounts/${service_account_email}" || true
          terraform import 'google_secret_manager_secret.env["DB_URL"]' "projects/${GCP_PROJECT_ID}/secrets/db-url" || true
          terraform import 'google_secret_manager_secret.env["DB_USERNAME"]' "projects/${GCP_PROJECT_ID}/secrets/db-username" || true
          terraform import 'google_secret_manager_secret.env["DB_PASSWORD"]' "projects/${GCP_PROJECT_ID}/secrets/db-password" || true
          terraform import 'google_secret_manager_secret.env["AI_API_KEY"]' "projects/${GCP_PROJECT_ID}/secrets/ai-api-key" || true
          terraform import 'google_cloud_run_v2_service.app' "projects/${GCP_PROJECT_ID}/locations/${GCP_REGION}/services/${GCP_SERVICE_NAME}" || true
          terraform import 'google_project_service.enabled["run.googleapis.com"]' "${GCP_PROJECT_ID}/run.googleapis.com" || true
          terraform import 'google_project_service.enabled["artifactregistry.googleapis.com"]' "${GCP_PROJECT_ID}/artifactregistry.googleapis.com" || true
          terraform import 'google_project_service.enabled["secretmanager.googleapis.com"]' "${GCP_PROJECT_ID}/secretmanager.googleapis.com" || true
          terraform import 'google_project_service.enabled["cloudbuild.googleapis.com"]' "${GCP_PROJECT_ID}/cloudbuild.googleapis.com" || true
          terraform import 'google_project_service.enabled["iam.googleapis.com"]' "${GCP_PROJECT_ID}/iam.googleapis.com" || true
          terraform import 'google_project_iam_member.run_secret_access' "${GCP_PROJECT_ID}/roles/secretmanager.secretAccessor/serviceAccount:${service_account_email}" || true
          terraform import 'google_cloud_run_v2_service_iam_member.public_invoker[0]' "projects/${GCP_PROJECT_ID}/locations/${GCP_REGION}/services/${GCP_SERVICE_NAME}/roles/run.invoker/allUsers" || true
          terraform apply -input=false -auto-approve
