name: Build Backend Image

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: build-image-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
      GCP_ARTIFACT_REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY || 'pdf-excel-ai' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        run: mvn -B test

      - name: Validate required configuration
        run: |
          test -n "$GCP_PROJECT_ID" || (echo "Missing GCP project id. Set repository variable GCP_PROJECT_ID (preferred) or secret GCP_PROJECT_ID." && exit 1)
          test -n "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" || (echo "Missing secret GCP_WORKLOAD_IDENTITY_PROVIDER" && exit 1)
          test -n "${{ secrets.GCP_SERVICE_ACCOUNT }}" || (echo "Missing secret GCP_SERVICE_ACCOUNT" && exit 1)

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Resolve image URI
        id: image
        run: |
          echo "uri=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REPOSITORY}/backend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and publish backend image
        run: |
          submit_output="$(gcloud builds submit \
            --project "${GCP_PROJECT_ID}" \
            --async \
            --tag "${{ steps.image.outputs.uri }}" \
            "$GITHUB_WORKSPACE" 2>&1)"

          echo "$submit_output"

          build_id="$(printf '%s\n' "$submit_output" | sed -n 's|.*builds/\([a-f0-9-]\{36\}\).*|\1|p' | head -n 1)"

          if [ -z "$build_id" ]; then
            echo "Unable to get Cloud Build ID from gcloud output"
            exit 1
          fi

          echo "Cloud Build submitted: ${build_id}"

          while true; do
            status="$(gcloud builds describe "$build_id" --project "${GCP_PROJECT_ID}" --format='value(status)')"
            echo "Cloud Build status: ${status}"

            case "$status" in
              SUCCESS)
                echo "Cloud Build finished successfully"
                break
                ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                echo "Cloud Build finished with terminal status: ${status}"
                exit 1
                ;;
            esac

            sleep 5
          done

      - name: Export image metadata
        run: |
          mkdir -p .github-artifacts
          echo "${{ steps.image.outputs.uri }}" > .github-artifacts/image_uri.txt

      - name: Upload image metadata
        uses: actions/upload-artifact@v4
        with:
          name: backend-image-metadata
          path: .github-artifacts/image_uri.txt