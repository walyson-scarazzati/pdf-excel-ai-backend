services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pdf_excel_ai}
      POSTGRES_USER: ${DB_USERNAME:-pdf_excel_ai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pdf_excel_ai}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-pdf_excel_ai} -d ${DB_NAME:-pdf_excel_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - custom_network

  backend:
    build:
      context: .
    restart: unless-stopped
    environment:
      PORT: ${PORT:-8081}
      AI_PROVIDER: ${AI_PROVIDER:-github-models}
      AI_API_URL: ${AI_API_URL:-https://models.github.ai/inference/chat/completions}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-openai/gpt-4.1-mini}
      AI_GITHUB_API_VERSION: ${AI_GITHUB_API_VERSION:-2026-03-10}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/${DB_NAME:-pdf_excel_ai}}
      DB_USERNAME: ${DB_USERNAME:-pdf_excel_ai}
      DB_PASSWORD: ${DB_PASSWORD:-pdf_excel_ai}
    ports:
      - "${HOST_PORT:-8081}:${PORT:-8081}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - custom_network

  frontend:
    build:
      context: ../pdf-excel-ai-frontend
    profiles:
      - frontend
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8081/api}
    ports:
      - "4200:80"
    depends_on:
      - backend

networks:
  custom_network:
    driver: bridge

volumes:
  postgres_data:
